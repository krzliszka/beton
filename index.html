<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#BETON </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --agh-green: #00693c;
            --black: #1e1e1e;
            --white: #f5f5f5;
            --concrete: #b8b8b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--black);
            color: var(--white);
            line-height: 1.5;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem 1.5rem 10rem; /* Zwiększony dolny padding, żeby przesunąć treść wyżej */
            position: relative;
            background: url('img/background1.png') center center/cover no-repeat, var(--black);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 50px,
                    rgba(0, 102, 51, 0.03) 50px,
                    rgba(0, 102, 51, 0.03) 51px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 50px,
                    rgba(0, 102, 51, 0.03) 50px,
                    rgba(0, 102, 51, 0.03) 51px
                );
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.08;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5rem, 18vw, 14rem);
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 0.9;
            margin-bottom: 1rem;
            z-index: 10;
        }

        .hero-title span {
            color: var(--white);
        }

        .cta-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: var(--white);
            color: var(--black);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 0.1em;
            border-radius: 4px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .cta-button:hover {
            background: var(--agh-green);
            color: var(--white);
            transform: translateY(-2px);
        }

        nav {
            position: absolute;
            bottom: 2rem;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--concrete);
            text-decoration: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--agh-green);
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">
            <span>#BETON</span>
        </h1>
        <a href="https://live.racetimingsystem.pl/publicRaces" target="_blank" class="cta-button">Puchar Betonu 2026 #2</a>
        <nav>
            <ul class="nav-links">
                <li><a href="2026.html">v</a></li>
            </ul>
        </nav>
    </section>
</body>
</html>
